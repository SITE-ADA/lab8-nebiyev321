 spring:
  application:
    name: resful-demo-jwt
  h2:
    console:
      enabled: 'true'
      path: /h2
  datasource:
    username: sa
    url: jdbc:h2:mem:umsDB;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    password: ''
  sql:
    init:
      mode: always
  jpa:
    properties:
      hibernate:
#        format_sql: 'true'
    defer-datasource-initialization: 'true'
    hibernate:
      ddl-auto: create-drop
    show-sql: 'true'
    open-in-view: false

security:
  jwt:
    secret-key: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
    # 1h in millisecond
    expiration-time: 3600000
    access-token-minutes: 5
    refresh-token-days: 7