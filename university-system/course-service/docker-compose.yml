services:
  course-db:
    image: postgres:17-alpine
    container_name: course-db
    environment:
      POSTGRES_DB: courseDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - course_postgres_data:/var/lib/postgresql/data

  course-service:
    build:
      context: ..
      dockerfile: course-service/Dockerfile
    container_name: course-service
    depends_on:
      - course-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://course-db:5432/courseDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      STUDENT_SERVICE_BASE_URL: http://student-service:8080
    ports:
      - "8081:8081"

volumes:
  course_postgres_data:
